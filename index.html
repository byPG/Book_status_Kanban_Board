<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- <link rel="icon" type="image/x-icon" href="favicon.ico" /> -->
  <title>Book Tracker Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">

    <header class="app-header">
      <h1>Book Tracker Board</h1>
      <p>Search books and organize them by reading status.</p>
    </header>

    <section class="search-section">
      <input
        type="text"
        id="searchInput"
        placeholder="Search for a book..."
      />
      <button id="searchBtn">Search</button>
    </section>

    <section class="results-section">
      <h2>Results</h2>
      <div id="resultsContainer" class="results-container"></div>
    </section>

    <section class="board-section">
      <h2>My Reading Board</h2>

      <div class="board-columns">

        <div class="board-column" data-status="to-read">
          <h3>To Read</h3>
          <div id="booksToReadColumn" class="column-books"></div>
        </div>

        <div class="board-column" data-status="reading">
          <h3>Reading</h3>
          <div id="readingColumn" class="column-books"></div>
        </div>

        <div class="board-column" data-status="finished">
          <h3>Finished</h3>
          <div id="finishedColumn" class="column-books"></div>
        </div>

      </div>
    </section>

  </main>

  <script src="main.js"></script>
</body>
</html>
